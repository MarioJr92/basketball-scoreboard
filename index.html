<html>
    <head><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
        <title>Basketball Scoreboard</title>
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>
                <h3 class="home-title">HOME</h3>
                <div id="home-el"></div>
                <button onclick="increaseHomeCountOne()">+1</button>
                <button onclick="increaseHomeCountTwo()">+2</button>
                <button onclick="increaseHomeCountThree()">+3</button>
            </div>
            <div>
                <h3 class="guest-title">GUEST</h3>
                <div id="guest-el"></div>
                <button onclick="increaseGuestCountOne()">+1</button>
                <button onclick="increaseGuestCountTwo()">+2</button>
                <button onclick="increaseGuestCountThree()">+3</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
